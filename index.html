<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon OSM Map - New York</title>
    <!-- Leaflet CSS CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font for icons and accents -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        /* ---------- RESET & VARIABLES (FOR THEMES) ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ------ MAP CONTAINER & ELEMENTS ------ */
        .map-wrapper {
            width: 100%;
            max-width: 1200px;
            background: #121212;
            border-radius: 32px;
            padding: 20px 20px 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* ---------- NEON TOGGLE ---------- */
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            margin-bottom: 16px;
            padding-right: 4px;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            color: #aaa;
            transition: color 0.3s ease;
        }

        /* Hidden checkbox — controls the theme */
        .toggle-checkbox {
            display: none;
        }

        /* Visual switch */
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: #2a2a2a;
            border-radius: 30px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        /* Slider with animation */
        .toggle-switch::before {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            background: #f0f0f0;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        background 0.3s ease,
                        box-shadow 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* Icons inside the toggle (neon aesthetic) */
        .toggle-icons {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 6px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1;
            color: #888;
            transition: color 0.3s ease;
        }

        /* ----- STATES: DARK-RED (NEON) vs LIGHT-BLUE (NEON) ----- */
        /* Default (checked = false) — dark-red neon */
        .toggle-checkbox:checked + .toggle-switch {
            background: #1a2a3a; /* dark background for blue */
            box-shadow: inset 0 2px 4px rgba(0,20,40,0.8), 0 0 12px #00e0ff66;
        }

        .toggle-checkbox:checked + .toggle-switch::before {
            transform: translateX(30px);
            background: #b0f0ff;
            box-shadow: 0 0 20px #00e0ff, 0 0 8px #00a0ff;
        }

        /* unchecked (red) */
        .toggle-checkbox:not(:checked) + .toggle-switch {
            background: #2a1a1a;
            box-shadow: inset 0 2px 4px rgba(40,0,0,0.8), 0 0 12px #ff3b3b66;
        }

        .toggle-checkbox:not(:checked) + .toggle-switch::before {
            background: #ffb0b0;
            box-shadow: 0 0 20px #ff3b3b, 0 0 8px #ff0000;
        }

        /* toggle labels */
        .toggle-label span:first-child {
            color: #ff7a7a;
            transition: color 0.3s;
        }
        .toggle-checkbox:checked ~ .toggle-label span:first-child {
            color: #7ac4ff;
        }

        .toggle-label span:last-child {
            color: #7ac4ff;
            transition: color 0.3s;
        }
        .toggle-checkbox:not(:checked) ~ .toggle-label span:last-child {
            color: #ff7a7a;
        }

        /* ---------- MAP ---------- */
        #map {
            width: 100%;
            height: 70vh; /* responsive height */
            min-height: 380px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 12px 28px rgba(0,0,0,0.7);
            transition: box-shadow 0.3s ease;
        }

        /* ---------- FOOTER WITH OSM ATTRIBUTION ---------- */
        .osm-credit {
            margin-top: 14px;
            padding: 10px 8px 4px;
            font-size: 0.75rem;
            color: #888;
            border-top: 1px solid #2a2a2a;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            transition: color 0.3s, border-color 0.3s;
        }

        .osm-credit a {
            color: #aaa;
            text-decoration: none;
            border-bottom: 1px dotted #555;
            transition: color 0.2s;
        }

        .osm-credit a:hover {
            color: #fff;
        }

        .osm-credit .license-badge {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .osm-credit .license-badge span {
            background: #1e1e1e;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 500;
            letter-spacing: 0.3px;
            font-size: 0.7rem;
            color: #bbb;
        }

        /* ---------- MOBILE ADAPTATION ---------- */
        @media (max-width: 640px) {
            .map-wrapper {
                padding: 12px 12px 10px;
                border-radius: 24px;
            }
            #map {
                height: 60vh;
                min-height: 280px;
                border-radius: 18px;
            }
            .theme-toggle {
                justify-content: center;
                margin-bottom: 12px;
            }
            .toggle-label {
                font-size: 0.8rem;
                gap: 6px;
            }
            .toggle-switch {
                width: 52px;
                height: 26px;
            }
            .toggle-switch::before {
                width: 20px;
                height: 20px;
                top: 3px;
                left: 3px;
            }
            .toggle-checkbox:checked + .toggle-switch::before {
                transform: translateX(26px);
            }
            .toggle-icons {
                font-size: 12px;
            }
            .osm-credit {
                flex-direction: column;
                align-items: flex-start;
                font-size: 0.7rem;
                gap: 6px;
            }
        }

        @media (max-width: 480px) {
            .map-wrapper {
                padding: 8px;
            }
            #map {
                height: 50vh;
                min-height: 200px;
            }
        }

        /* Leaflet overrides (so it doesn't overlap) */
        .leaflet-control-attribution {
            font-size: 9px !important;
            background: rgba(0,0,0,0.6) !important;
            color: #ccc !important;
            backdrop-filter: blur(2px);
            border-radius: 12px !important;
            padding: 2px 10px !important;
        }
        .leaflet-control-attribution a {
            color: #9cf !important;
        }
        /* Keep attribution from covering controls */
        .leaflet-bottom.leaflet-right {
            bottom: 8px;
            right: 8px;
        }
    </style>
</head>
<body>
    <div class="map-wrapper">
        <!-- THEME TOGGLE -->
        <div class="theme-toggle">
            <input type="checkbox" id="themeToggle" class="toggle-checkbox">
            <label for="themeToggle" class="toggle-label">
                <span>🌑 Dark Red</span>
                <span class="toggle-switch">
                    <span class="toggle-icons">
                        <span>🔥</span>
                        <span>❄️</span>
                    </span>
                </span>
                <span>🌐 Light Blue</span>
            </label>
        </div>

        <!-- MAP -->
        <div id="map"></div>

        <!-- FOOTER WITH OSM ATTRIBUTION & LICENSE -->
        <div class="osm-credit">
            <div>
                <span>© </span>
                <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener noreferrer">
                    OpenStreetMap contributors
                </a>
                <span style="margin-left: 8px; opacity:0.7;">|</span>
                <span style="margin-left: 8px; opacity:0.7;">OSM data is available under </span>
                <a href="https://opendatacommons.org/licenses/odbl/" target="_blank" rel="noopener noreferrer">ODbL</a>
            </div>
            <div class="license-badge">
                <span>🌍 OSM</span>
                <span>⚖️ ODbL / CC-BY-SA</span>
            </div>
        </div>
        <!-- Additional notice about copyright compliance (as required by OSM) -->
        <div style="font-size: 0.6rem; color: #555; text-align: right; padding-top: 4px; border-top: 1px solid #1f1f1f; margin-top: 6px;">
            <span>This site uses OpenStreetMap tiles. We comply with </span>
            <a href="https://www.openstreetmap.org/fixthemap" target="_blank" style="color:#777; text-decoration:underline dotted;">usage guidelines</a>
            <span> and clearly attribute authorship.</span>
        </div>
    </div>

    <!-- ------ LEAFLET (CDN) ------ -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        (function() {
            "use strict";

            // ----------------------------------------------------------------
            // 1. MAP INITIALIZATION
            //    Centered on New York City (no markers, just the map view)
            // ----------------------------------------------------------------
            const map = L.map('map', {
                center: [40.7128, -74.0060], // New York City coordinates
                zoom: 12,
                zoomControl: true,
                fadeAnimation: true,
                attributionControl: true
            });

            // ----------------------------------------------------------------
            // 2. BASE OSM LAYER
            //    Using standard OSM tile URL with proper attribution
            // ----------------------------------------------------------------
            const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors'
            }).addTo(map);

            // ----------------------------------------------------------------
            // 3. THEME MANAGEMENT (NEON TOGGLE)
            //    Changes styles on .map-wrapper and #map via body classes + inline
            // ----------------------------------------------------------------
            const toggleCheckbox = document.getElementById('themeToggle');
            const mapWrapper = document.querySelector('.map-wrapper');
            const mapElement = document.getElementById('map');

            // Function to apply theme (styles on body and elements)
            function applyTheme(checked) {
                if (checked) {
                    // LIGHT-BLUE NEON
                    document.body.style.background = '#0e1a26';
                    mapWrapper.style.background = '#162b38';
                    mapWrapper.style.boxShadow = '0 20px 40px rgba(0, 180, 255, 0.25)';
                    mapElement.style.boxShadow = '0 0 0 1px #40c0ff55, 0 12px 28px rgba(0, 100, 200, 0.5)';
                    // Footer text color
                    document.querySelector('.osm-credit').style.color = '#b0d0e0';
                    document.querySelector('.osm-credit').style.borderTopColor = '#2a4a5a';
                } else {
                    // DARK-RED NEON
                    document.body.style.background = '#0b0b0b';
                    mapWrapper.style.background = '#1a1212';
                    mapWrapper.style.boxShadow = '0 20px 40px rgba(255, 40, 40, 0.25)';
                    mapElement.style.boxShadow = '0 0 0 1px #ff555533, 0 12px 28px rgba(200, 0, 0, 0.5)';
                    document.querySelector('.osm-credit').style.color = '#b0a0a0';
                    document.querySelector('.osm-credit').style.borderTopColor = '#3a2222';
                }
            }

            // Initial state (checkbox unchecked by default → dark red)
            // Force apply theme on load
            setTimeout(() => {
                applyTheme(toggleCheckbox.checked);
            }, 20);

            // Listen for toggle changes
            toggleCheckbox.addEventListener('change', function(e) {
                applyTheme(this.checked);
            });

            // ----------------------------------------------------------------
            // 4. ADDITIONAL MAP CONTROLS (optional)
            //    Standard zoom control is already there. We keep it clean.
            // ----------------------------------------------------------------

            // ----------------------------------------------------------------
            // 5. ATTRIBUTION & OSM COMPLIANCE
            //    - Attribution is already in the tileLayer.
            //    - Footer explicitly links to OSM and ODbL license.
            //    - Additional notice about usage guidelines.
            //    - "fixthemap" and copyright links are visible.
            //    All of this is required to respect OSM copyright.
            // ----------------------------------------------------------------
            console.log('Leaflet version:', L.version);
            console.log('OSM map initialized. Centered on New York City. Attribution: © OpenStreetMap contributors.');

            // ----------------------------------------------------------------
            // 6. (Optional) Re-render map on window resize for mobile
            // ----------------------------------------------------------------
            window.addEventListener('resize', function() {
                map.invalidateSize();
            });

        })();
    </script>
</body>
</html>
